name: AI Code Review

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # نحتاج التاريخ لحساب الـ diff

      - name: Build diff and send to AI Code Reviewer
        env:
          REVIEWER_URL: https://codereview.alrabeei.cloud/review
          APP_API_TOKEN: ${{ secrets.APP_API_TOKEN }}
          # تُمرَّر عبر env (لا داخل السكربت) لتفادي مشاكل الاقتباس/الحقن:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # 1) نطاق الـ diff + الوصف حسب نوع الحدث
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=100 origin "$BASE_REF" || true
            RANGE="origin/$BASE_REF...HEAD"
            TITLE="$PR_TITLE"; BODY="$PR_BODY"
          else
            if [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="HEAD~1 HEAD"                 # أول push / لا يوجد sha سابق
            else
              RANGE="$EVENT_BEFORE $HEAD_SHA"
            fi
            TITLE="Push Review"; BODY="Automatic review on every push"
          fi

          # 2) أنشئ diff.txt + قائمة الملفات (مع بدائل آمنة)
          git diff $RANGE > diff.txt 2>/dev/null || git show --format= "$HEAD_SHA" > diff.txt
          FILES=$(git diff --name-only $RANGE 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length>0))' || echo '[]')

          # حدّ أمان لحجم الرفع (الخادم أصلًا ينظّف ويقصّ عند 60000 حرف):
          head -c 1000000 diff.txt > diff.tmp && mv diff.tmp diff.txt

          MSG=$(git log -1 --pretty=%B "$HEAD_SHA")

          # 3) ابنِ الجسم في ملف بـ jq (يحلّ "Argument list too long")
          jq -n \
            --arg repo   "$REPO" \
            --arg url    "$SERVER_URL/$REPO" \
            --arg branch "$REF_NAME" \
            --arg sha    "$HEAD_SHA" \
            --arg author "$ACTOR" \
            --arg title  "$TITLE" \
            --arg body   "$BODY" \
            --arg msg    "$MSG" \
            --argjson files "$FILES" \
            --rawfile diff diff.txt \
            '{repository_name:$repo, repository_url:$url, branch_name:$branch,
              commit_sha:$sha, author:$author, pr_title:$title,
              pr_description:$body, commit_message:$msg,
              changed_files:$files, diff:$diff}' > body.json

          # 4) أرسل (curl يقرأ الجسم من الملف، لا من سطر الأوامر).
          #    نطبع رمز HTTP + الرد، ونُفشل الخطوة عند أي خطأ (401/422/5xx)
          #    حتى لا يبقى الأكشن "أخضر" بينما الطلب مرفوض.
          HTTP=$(curl -sS -o resp.json -w '%{http_code}' -X POST "$REVIEWER_URL" \
            -H "Authorization: Bearer $APP_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data @body.json)
          echo "HTTP $HTTP"; cat resp.json; echo
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::Reviewer returned HTTP $HTTP (تحقّق من سرّ APP_API_TOKEN)"
            exit 1
          fi
